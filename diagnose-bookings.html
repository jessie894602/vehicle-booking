<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预定记录诊断</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
        }
        h1 {
            color: #333;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background: #4A90E2;
            color: white;
        }
        tr:nth-child(even) {
            background: #f9f9f9;
        }
        .returned {
            background: #ffebee !important;
        }
        .active {
            background: #e8f5e9 !important;
        }
        .name-mismatch {
            background: #fff3cd !important;
        }
        button {
            background: #4A90E2;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #357abd;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-box {
            width: 20px;
            height: 20px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 预定记录诊断工具</h1>

        <div class="info">
            <strong>保存的姓名：</strong> <span id="savedName">-</span><br>
            <strong>输入其他姓名查看：</strong>
            <input type="text" id="customName" placeholder="输入姓名" style="padding: 5px; margin-left: 10px;">
            <button onclick="loadCustomBookings()">查询</button>
        </div>

        <button onclick="loadBookings()">刷新数据</button>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-box active"></div>
                <span>未还车（进行中）</span>
            </div>
            <div class="legend-item">
                <div class="legend-box returned"></div>
                <span>已还车</span>
            </div>
            <div class="legend-item">
                <div class="legend-box name-mismatch"></div>
                <span>姓名不匹配</span>
            </div>
        </div>

        <h2>所有预定记录</h2>
        <div id="results">点击"刷新数据"按钮加载</div>

        <h2>我的预定记录（未还车）</h2>
        <div id="myBookings">-</div>
    </div>

    <script src="js/data-jsonbin.js"></script>
    <script>
        // 显示保存的姓名
        const savedName = localStorage.getItem('feishu_user_name') || '未保存';
        document.getElementById('savedName').textContent = savedName;

        async function loadBookings() {
            try {
                const bookings = await dataManager.getAllBookings();
                const vehicles = await dataManager.getAllVehicles();

                if (!bookings || bookings.length === 0) {
                    document.getElementById('results').innerHTML = '<p>没有预定记录</p>';
                    return;
                }

                // 创建表格
                let html = '<table>';
                html += '<tr><th>序号</th><th>车辆</th><th>申请人</th><th>申请原因</th><th>开始时间</th><th>结束时间</th><th>状态</th><th>姓名匹配</th></tr>';

                bookings.forEach((booking, index) => {
                    const vehicle = vehicles.find(v => v.id === booking.vehicleId);
                    const vehicleName = vehicle ? (vehicle.model || vehicle.vehicle) : '未知';
                    const isReturned = booking.returned;
                    const nameMatch = booking.person === savedName;

                    let rowClass = '';
                    if (isReturned) {
                        rowClass = 'returned';
                    } else if (!nameMatch) {
                        rowClass = 'name-mismatch';
                    } else {
                        rowClass = 'active';
                    }

                    html += `<tr class="${rowClass}">`;
                    html += `<td>${index + 1}</td>`;
                    html += `<td>${vehicleName}</td>`;
                    html += `<td>${booking.person}</td>`;
                    html += `<td>${booking.reason}</td>`;
                    html += `<td>${formatDateTime(booking.startTime)}</td>`;
                    html += `<td>${formatDateTime(booking.endTime)}</td>`;
                    html += `<td>${isReturned ? '✅ 已还车' : '🚗 使用中'}</td>`;
                    html += `<td>${nameMatch ? '✅ 匹配' : '❌ 不匹配'}</td>`;
                    html += '</tr>';
                });

                html += '</table>';
                document.getElementById('results').innerHTML = html;

                // 显示"我的预定"会显示的内容
                const myBookings = bookings.filter(b => b.person === savedName && !b.returned);
                document.getElementById('myBookings').innerHTML = `<p><strong>共 ${myBookings.length} 条未还车记录</strong></p>`;

            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('results').innerHTML = '<p style="color: red;">加载失败: ' + error.message + '</p>';
            }
        }

        async function loadCustomBookings() {
            const customName = document.getElementById('customName').value.trim();
            if (!customName) {
                alert('请输入姓名');
                return;
            }

            try {
                const bookings = await dataManager.getAllBookings();
                const vehicles = await dataManager.getAllVehicles();

                const myBookings = bookings.filter(b => b.person === customName && !b.returned);

                let html = '<table>';
                html += '<tr><th>序号</th><th>车辆</th><th>申请原因</th><th>开始时间</th><th>结束时间</th></tr>';

                myBookings.forEach((booking, index) => {
                    const vehicle = vehicles.find(v => v.id === booking.vehicleId);
                    const vehicleName = vehicle ? (vehicle.model || vehicle.vehicle) : '未知';

                    html += '<tr>';
                    html += `<td>${index + 1}</td>`;
                    html += `<td>${vehicleName}</td>`;
                    html += `<td>${booking.reason}</td>`;
                    html += `<td>${formatDateTime(booking.startTime)}</td>`;
                    html += `<td>${formatDateTime(booking.endTime)}</td>`;
                    html += '</tr>';
                });

                html += '</table>';
                html = `<p><strong>${customName} 的未还车预定：${myBookings.length} 条</strong></p>` + html;
                document.getElementById('myBookings').innerHTML = html;

            } catch (error) {
                alert('查询失败: ' + error.message);
            }
        }

        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}/${month}/${day} ${hours}:${minutes}`;
        }
    </script>
</body>
</html>
