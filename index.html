<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="车辆预定系统 - 浏览和预定可用车辆">
    <title>车辆预定系统 - 车辆列表</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">车辆预定系统</a>
                <nav class="nav-links">
                    <a href="index.html" class="nav-link">预定车辆</a>
                    <a href="my-bookings.html" class="nav-link">还车</a>
                    <a href="statistics-new.html" class="nav-link">使用统计</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="main-content">
        <div class="container">
            <!-- 预定提示框 -->
            <div id="bookingNotification" class="booking-notification hidden">
                <div class="notification-content">
                    <span class="notification-icon">✓</span>
                    <span class="notification-message"></span>
                    <button class="notification-close" onclick="closeNotification()">×</button>
                </div>
            </div>

            <h1 class="page-title">可预定车辆 <span class="page-subtitle">预定操作指南：1.点击绿色时间按钮，可拖拽多选，每个绿色格子代表一小时 2.点击蓝色"预定"按钮进入详情页进行预定</span></h1>

            <!-- 时间表头（只显示一次） -->
            <div id="scheduleHeader" class="schedule-header-fixed hidden"></div>

            <!-- 车辆列表加载状态 -->
            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>

            <!-- 车辆卡片网格 -->
            <div id="vehiclesGrid" class="vehicles-grid hidden"></div>

            <!-- 空状态 -->
            <div id="emptyState" class="text-center hidden" style="padding: 60px 20px;">
                <h2 style="color: #999;">暂无可用车辆</h2>
                <p style="color: #666;">请稍后再试</p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 车辆预定系统. All rights reserved.</p>
        </div>
    </footer>

    <!-- 引入JavaScript文件 -->
    <script src="js/user-manager.js?v=20260303"></script>
    <script src="js/data-jsonbin.js?v=20260303"></script>
    <script src="js/app.js?v=11"></script>
    <script>
        // 初始化用户系统
        document.addEventListener('DOMContentLoaded', async function() {
            await userManager.init();
        });
    </script>
</body>
</html>
