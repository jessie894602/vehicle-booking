        async function viewCurrentVehicles() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>正在获取数据...</p>';

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await response.json();
                const vehicles = data.record.vehicles || [];

                let html = `<div class="info">
                    <h3>📋 当前车辆列表（共 ${vehicles.length} 辆）</h3>
                    <div class="vehicle-list">`;

                vehicles.forEach((v, index) => {
                    html += `
                        <div class="vehicle-item">
                            <strong>${index + 1}. ${v.model || v.vehicle || '未知'}</strong>
                            (${v.series || '-'}) - ${v.location || v.city || '-'} - ${v.stage || '-'}
                        </div>`;
                });

                html += `</div></div>`;
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<div class="error">❌ 错误: ${error.message}</div>`;
            }
        }
