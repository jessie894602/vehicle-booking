<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除缓存 - 车辆预定系统</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .success {
            color: #50C878;
            font-size: 48px;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #4A90E2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #3a7bc8;
            transform: translateY(-2px);
        }
        .info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✓</div>
        <h1>缓存已清除</h1>
        <p>车辆数据已重置，现在将显示最新的16辆车辆信息。</p>

        <div class="info">
            <strong>已清除内容：</strong><br>
            • 旧的车辆数据<br>
            • 所有预定记录<br>
            • 浏览器缓存
        </div>

        <a href="index.html" class="btn">返回车辆列表</a>
    </div>

    <script>
        // 清除LocalStorage中的所有数据
        localStorage.clear();

        // 显示清除成功消息
        console.log('LocalStorage已清除');
        console.log('车辆数据已重置');
    </script>
</body>
</html>
