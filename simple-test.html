<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试 - 车辆列表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .vehicle-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #ef5350;
        }
    </style>
</head>
<body>
    <h1>车辆列表测试</h1>
    <div id="status" class="loading">加载中...</div>
    <div id="vehicles"></div>

    <script src="js/data.js"></script>
    <script src="js/data-jsonbin.js"></script>

    <script>
        // 在页面上显示错误
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('status').innerHTML =
                '<div class="error"><h3>JavaScript 错误：</h3>' +
                '<p><strong>消息:</strong> ' + message + '</p>' +
                '<p><strong>文件:</strong> ' + source + '</p>' +
                '<p><strong>行号:</strong> ' + lineno + '</p></div>';
            return true;
        };

        async function loadVehicles() {
            try {
                document.getElementById('status').innerHTML = '正在获取数据...';

                // 调用 dataManager
                const vehicles = await dataManager.getAllVehicles();

                document.getElementById('status').innerHTML =
                    '<p style="color:green;">✅ 成功获取 ' + vehicles.length + ' 辆车！</p>';

                const vehiclesDiv = document.getElementById('vehicles');
                vehiclesDiv.innerHTML = '';

                vehicles.forEach(vehicle => {
                    const card = document.createElement('div');
                    card.className = 'vehicle-card';
                    card.innerHTML = `
                        <h3>${vehicle.model || vehicle.vehicle || '未知车辆'}</h3>
                        <p><strong>编码:</strong> ${vehicle.code || '-'}</p>
                        <p><strong>位置:</strong> ${vehicle.location || vehicle.city || '-'}</p>
                        <p><strong>阶段:</strong> ${vehicle.stage || '-'}</p>
                    `;
                    vehiclesDiv.appendChild(card);
                });
            } catch (error) {
                document.getElementById('status').innerHTML =
                    '<div class="error"><h3>❌ 加载失败：</h3>' +
                    '<p>' + error.message + '</p>' +
                    '<p><strong>完整错误:</strong> ' + error.stack + '</p></div>';
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadVehicles);
    </script>
</body>
</html>
