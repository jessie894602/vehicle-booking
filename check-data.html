<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>检查 JSONBin 数据</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #2196F3;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background: #0b7dda;
        }
        #result {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>检查 JSONBin 数据</h1>
    <button onclick="checkData()">查看数据</button>
    <div id="result"></div>

    <script>
        const JSONBIN_API_KEY = '$2a$10$0.el1vGg3USJgC1Gtui4k.FbLS9R6XHKyqM6n7YS9HjQgm2trFXW.';
        const JSONBIN_BIN_ID = '699fd213d0ea881f40da7ef2';

        async function checkData() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在获取数据...';

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_API_KEY
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = '✅ 成功获取数据！\n\n' +
                        '车辆数量: ' + (data.record.vehicles ? data.record.vehicles.length : 0) + '\n' +
                        '预定数量: ' + (data.record.bookings ? data.record.bookings.length : 0) + '\n\n' +
                        '完整数据:\n' + JSON.stringify(data.record, null, 2);
                } else {
                    resultDiv.innerHTML = '❌ 获取失败：' + data.message;
                }
            } catch (error) {
                resultDiv.innerHTML = '❌ 错误：' + error.message;
            }
        }
    </script>
</body>
</html>
