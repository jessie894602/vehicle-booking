<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="车辆使用统计 - 查看每辆车的使用情况">
    <title>车辆使用统计 - 车辆预定系统</title>
    <link rel="stylesheet" href="css/style.css?v=20260302170500">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">车辆预定系统</a>
                <nav class="nav-links">
                    <a href="index.html" class="nav-link">预定车辆</a>
                    <a href="my-bookings.html" class="nav-link">还车</a>
                    <a href="statistics-new.html" class="nav-link">使用统计</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="main-content">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 class="page-title">车辆使用统计</h1>
                <div style="display: flex; gap: 10px;">
                    <button id="exportDataBtn" class="btn-export">📥 导出数据</button>
                    <button id="clearStatsBtn" class="btn-clear">清除所有统计</button>
                </div>
            </div>

            <!-- 统计概览 -->
            <div class="stats-overview">
                <div class="stat-card">
                    <div class="stat-icon">🚗</div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalVehicles">0</div>
                        <div class="stat-label">车辆总数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalUsages">0</div>
                        <div class="stat-label">总使用次数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalHours">0</div>
                        <div class="stat-label">总使用时长(小时)</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">使用人数</div>
                    </div>
                </div>
            </div>

            <!-- 月度使用率分析 -->
            <div class="monthly-analysis-section">
                <h2 style="margin-bottom: 20px;">📊 月度使用率分析</h2>
                <div id="monthlyUtilizationTable"></div>
            </div>

            <!-- 空状态 -->
            <div id="emptyState" class="text-center hidden" style="padding: 60px 20px;">
                <h2 style="color: #999;">暂无使用统计</h2>
                <p style="color: #666;">还没有车辆被使用过</p>
                <a href="index.html" class="view-detail-btn" style="max-width: 200px; margin: 20px auto; display: block;">查看车辆列表</a>
            </div>
        </div>
    </main>

    <!-- 导出数据弹窗 -->
    <div id="exportModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>导出预定数据</h2>
                <span class="modal-close" onclick="closeExportModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">时间范围</label>
                    <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
                        <input type="date" id="exportStartDate" class="form-control" style="flex: 1;">
                        <span>至</span>
                        <input type="date" id="exportEndDate" class="form-control" style="flex: 1;">
                    </div>
                    <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
                        <button onclick="setDateRange('all')" class="btn-date-preset">全部数据</button>
                        <button onclick="setDateRange('week')" class="btn-date-preset">最近一周</button>
                        <button onclick="setDateRange('month')" class="btn-date-preset">最近一个月</button>
                        <button onclick="setDateRange('threeMonths')" class="btn-date-preset">最近三个月</button>
                        <button onclick="setDateRange('year')" class="btn-date-preset">最近一年</button>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">包含字段</label>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_person"> 使用人
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_vehicle"> 车辆名称
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_reason"> 申请原因
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_startTime"> 开始时间
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_endTime"> 结束时间
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_duration"> 使用时长
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_status"> 状态
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" checked id="field_returnTime"> 还车时间
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeExportModal()" class="btn-cancel">取消</button>
                <button onclick="executeExport()" class="btn-confirm">导出 CSV</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 车辆预定系统. All rights reserved.</p>
        </div>
    </footer>

    <!-- 引入JavaScript文件 -->
    <script src="js/user-manager.js?v=20260303"></script>
    <script src="js/data-jsonbin.js?v=20260303"></script>
    <script src="js/statistics.js?v=20260302171000"></script>
    <script>
        // 初始化用户系统，然后加载统计页面
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('=== HTML: 开始初始化 ===');
            await userManager.init();
            console.log('=== HTML: 用户管理器初始化完成 ===');
            console.log('当前用户:', userManager.getCurrentUser());
            console.log('是否管理员:', userManager.isAdmin());

            // 触发统计页面初始化
            window.initStatisticsPage();
        });
    </script>
</body>
</html>
