<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JSONBin 连接测试</title>
</head>
<body>
    <h1>JSONBin 连接测试</h1>
    <button onclick="testConnection()">点击测试连接</button>
    <div id="result"></div>

    <script>
        const JSONBIN_API_KEY = '$2a$10$0.el1vGg3USJgC1Gtui4k.FbLS9R6XHKyqM6n7YS9HjQgm2trFXW.';
        const JSONBIN_BIN_ID = '699fd213d0ea881f40da7ef2';

        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在连接...</p>';

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_API_KEY
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = '<p style="color:green">✅ 连接成功！</p><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    resultDiv.innerHTML = '<p style="color:red">❌ 连接失败：' + data.message + '</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<p style="color:red">❌ 错误：' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
